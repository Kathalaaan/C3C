<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA 365 COMPASS</title>
    <script src="site_ui.js" defer></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
}

.logo-box{
    width:700px;
    height:700px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

svg{
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    object-fit:contain;
}

/* original colored logo hidden first */
.original-logo{
    opacity:0;
}

/* drawing layer */
.stroke-copy path{
    fill:none !important;
    stroke:white;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
}

</style>
</head>
<body>

<div class="logo-box" id="logo-container"></div>

<script>
fetch('logo.svg')
.then(res => res.text())
.then(data => {

    document.getElementById('logo-container').innerHTML = data;

    const original = document.querySelector('#logo-container svg');
    original.classList.add('original-logo');

    if(!original.getAttribute('viewBox')){
        original.setAttribute('viewBox','0 0 2000 2000');
    }

    const strokeClone = original.cloneNode(true);
    strokeClone.classList.add('stroke-copy');

    document.getElementById('logo-container').appendChild(strokeClone);

    const paths = strokeClone.querySelectorAll('path');

    paths.forEach(path => {
        const len = path.getTotalLength();
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
    });

    anime.timeline({
        complete: function() {
            setTimeout(() => {
                window.location.href = "index1.html";
            }, 1000);
        }
    })

    .add({
        targets: strokeClone.querySelectorAll('path'),
        strokeDashoffset:[anime.setDashoffset,0],
        easing:'easeInOutSine',
        duration:3000,
        delay:anime.stagger(2)
    })

    .add({
        targets: original,
        opacity:[0,1],
        duration:1000,
        easing:'easeInOutQuad'
    }, '+=200')

    .add({
        targets: strokeClone,
        opacity:[1,0],
        duration:800,
        easing:'easeInOutQuad'
    }, '-=500');

});
</script>

</body>
</html>
